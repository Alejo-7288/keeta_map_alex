<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍽️ 餐廳路線規劃</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.min.css" />
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --panel: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --orange: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════
       VIEW 1: RESTAURANT SELECTION (FULL PAGE)
    ══════════════════════════════════════════ */
    #view-selection {
      display: flex;
      height: 100vh;
    }

    /* Left Panel - Filters & Stats */
    #filter-panel {
      width: 380px;
      min-width: 320px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 12px rgba(0,0,0,0.06);
      height: 100vh;
      overflow: hidden;
    }

    #filter-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #filter-header h1 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 2px;
    }
    #filter-header p {
      font-size: 11px;
      color: var(--muted);
    }

    #filter-controls {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      max-height: 45vh;
      overflow-y: auto;
    }

    #gps-bar {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .filter-group {
      margin-bottom: 10px;
    }
    .filter-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
      display: block;
    }

    #district-select, #status-filter {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #district-select:focus, #status-filter:focus {
      border-color: var(--primary);
      outline: none;
    }

    .toggle-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .toggle-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: white;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
    .toggle-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Selection Stats Bar */
    #selection-bar {
      padding: 10px 14px;
      background: #eff6ff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #selection-bar .count {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }
    #selection-bar .hint {
      font-size: 11px;
      color: var(--muted);
    }

    /* Action Buttons */
    #action-bar {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Restaurant List */
    #restaurant-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }
    #restaurant-list::-webkit-scrollbar { width: 4px; }
    #restaurant-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    .rest-item {
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: white;
      transition: all 0.2s;
      cursor: pointer;
    }
    .rest-item:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(37,99,235,0.1); }
    .rest-item.selected {
      border-color: var(--success);
      background: #f0fdf4;
      box-shadow: 0 2px 8px rgba(34,197,94,0.15);
    }
    .rest-item.geocoded { border-left: 4px solid var(--success); }
    .rest-item.not-geocoded { border-left: 4px solid #fca5a5; opacity: 0.7; }

    .rest-item-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }
    .rest-checkbox {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .rest-name {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      line-height: 1.3;
    }
    .rest-district-badge {
      font-size: 10px;
      background: #dbeafe;
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .rest-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin: 4px 0 4px 28px;
    }
    .rest-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
    }
    .tag-late { background: #1e293b; color: #fbbf24; }
    .tag-early { background: #fef3c7; color: #92400e; }
    .tag-claimed { background: #d1fae5; color: #065f46; }
    .tag进驻 { background: #dbeafe; color: #1e40af; }

    .rest-address {
      font-size: 11px;
      color: var(--muted);
      margin-left: 28px;
      line-height: 1.4;
    }
    .rest-meta {
      font-size: 10px;
      color: var(--muted);
      margin-left: 28px;
      margin-top: 2px;
    }

    .rest-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      margin-left: 28px;
    }
    .geo-status {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .geo-ok { background: #dcfce7; color: #15803d; }
    .geo-missing { background: #fee2e2; color: #b91c1c; }

    /* Floating Route Button */
    #floating-route-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(37,99,235,0.4);
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 9999;
      transition: all 0.2s;
    }
    #floating-route-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(37,99,235,0.5);
    }
    #floating-route-btn.show { display: flex; }

    /* ══════════════════════════════════════════
       VIEW 2: MAP VIEW
    ══════════════════════════════════════════ */
    #view-map {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    #view-map.active { display: flex; }
    #view-selection.hidden { display: none; }

    #map-top-bar {
      background: var(--panel);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      z-index: 1000;
      flex-shrink: 0;
    }
    #map-top-bar h2 {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }
    #map-selected-count {
      font-size: 13px;
      color: var(--muted);
    }

    #map { flex: 1; }

    /* Back Button */
    #back-btn {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      transition: all 0.2s;
      white-space: nowrap;
    }
    #back-btn:hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }

    /* Route Info Panel */
    #route-info-panel {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: none;
      flex-shrink: 0;
    }
    #route-info-panel.show { display: block; }
    #route-info-panel .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    #route-info-panel .stat-box {
      flex: 1;
      background: var(--bg);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    #route-info-panel .stat-val {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
    }
    #route-info-panel .stat-lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    #route-info-panel .btn-row {
      display: flex;
      gap: 8px;
    }

    /* Route Stop in Sidebar */
    #route-sidebar {
      width: 300px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
    }
    #route-sidebar.show { display: flex; }
    #route-sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
    }
    #route-stop-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .route-stop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 4px;
      background: var(--bg);
      border: 1.5px solid var(--border);
    }
    .route-stop-item.active {
      border-color: var(--primary);
      background: #eff6ff;
    }
    .route-stop-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .route-stop-info { flex: 1; min-width: 0; }
    .route-stop-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .route-stop-addr {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .route-stop-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
    }
    .route-stop-del:hover { color: var(--danger); background: #fee2e2; }

    /* Map Route Actions */
    #map-actions {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    /* Buttons */
    .btn {
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: #f1f5f9; }
    .btn-orange { background: var(--orange); color: white; }
    .btn-orange:hover { background: #ea580c; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 8px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-row { display: flex; gap: 8px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-state i {
      font-size: 36px;
      opacity: 0.25;
      margin-bottom: 10px;
      display: block;
    }

    /* Loading */
    .loading-row {
      text-align: center;
      padding: 30px;
      color: var(--muted);
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      z-index: 3000;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      max-width: calc(100vw - 40px);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Map responsive */
    @media (max-width: 768px) {
      #view-selection {
        flex-direction: column !important;
        height: 100dvh;
        overflow: hidden;
      }
      #filter-panel {
        width: 100% !important;
        min-width: 0 !important;
        height: 100dvh !important;
        flex: 0 0 100dvh !important;
        flex-direction: column !important;
        border-right: none !important;
        border-bottom: none !important;
        border-top: 1px solid var(--border);
        box-shadow: none !important;
        overflow: hidden !important;
        display: flex !important;
      }
      #filter-header {
        flex-shrink: 0;
      }
      #filter-controls {
        flex-shrink: 0;
        max-height: 30dvh;
        overflow-y: auto;
      }
      #gps-bar, #selection-bar, #action-bar {
        flex-shrink: 0;
      }
      #restaurant-list {
        flex: 1 !important;
        min-height: 0 !important;
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
        height: auto !important;
      }
      #filter-footer {
        flex-shrink: 0;
      }
      /* Right panel hidden on mobile */
      #view-selection > div:last-child {
        display: none !important;
      }
      #route-sidebar { width: 100%; height: 200px; }
      #floating-route-btn {
        bottom: 20px;
        right: 20px;
        padding: 12px 18px;
        font-size: 14px;
      }
      #back-btn {
        padding: 6px 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     VIEW 1: FULL PAGE RESTAURANT SELECTION
══════════════════════════════════════════ -->
<div id="view-selection">
  <!-- Filter Panel (Left) -->
  <div id="filter-panel">
    <div id="filter-header">
      <h1>🍽️ 餐廳庫</h1>
      <p>選擇你想走訪的餐廳 → 查看路線</p>
    </div>

    <!-- Filters -->
    <div id="filter-controls">
      <div class="filter-group">
        <label class="filter-label">地區</label>
        <select id="district-select" onchange="renderRestaurantList()">
          <option value="">全部地區</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">營業狀態</label>
        <select id="status-filter" onchange="renderRestaurantList()">
          <option value="">全部</option>
          <option value="未處理">⭕ 未處理</option>
          <option value="已認領">✅ 已認領</option>
          <option value="已進駐">🏠 已進駐</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label">時段標籤</label>
        <div class="toggle-row">
          <button class="toggle-btn" id="toggle-late" onclick="toggleFilter('late')">
            🌙 宵夜店
          </button>
          <button class="toggle-btn" id="toggle-early" onclick="toggleFilter('early')">
            🌅 早市
          </button>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">搜尋店名</label>
        <input type="text" id="search-input" placeholder="輸入店名關鍵字..."
          oninput="renderRestaurantList()"
          style="width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;" />
      </div>
    </div>

    <!-- GPS Bar -->
    <div id="gps-bar">
      <button class="btn btn-secondary btn-sm" onclick="getCurrentLocation()" style="width:100%;justify-content:center;">
        <i class="fa-solid fa-location-crosshairs"></i> 📍 定位我現在的位置
      </button>
    </div>

    <!-- Selection Bar -->
    <div id="selection-bar">
      <span class="count" id="selected-count-display">已選擇 0 間</span>
      <span class="hint">已選擇的餐廳會顯示在右側列表</span>
    </div>

    <!-- Action Buttons -->
    <div id="action-bar">
      <button class="btn btn-secondary btn-sm" onclick="selectAllVisible()" style="font-size:12px;">
        <i class="fa-solid fa-check-square"></i> 全選
      </button>
      <button class="btn btn-secondary btn-sm" onclick="deselectAllVisible()" style="font-size:12px;">
        <i class="fa-solid fa-square"></i> 取消全選
      </button>
    </div>

    <!-- Restaurant List -->
    <div id="restaurant-list">
      <div class="loading-row">
        <i class="fa-solid fa-spinner fa-spin"></i><br/>
        載入餐廳數據中...
      </div>
    </div>

    <!-- Footer Stats -->
    <div id="filter-footer" style="padding:10px 14px;border-top:1px solid var(--border);background:#f8fafc;flex-shrink:0;">
      <div style="font-size:11px;color:var(--muted);display:flex;justify-content:space-between;">
        <span>顯示 <span id="visible-count">0</span> 間</span>
        <span>總計 <span id="total-db-count">0</span> 間</span>
      </div>
    </div>
  </div>

  <!-- Selected Restaurants Preview (Right) -->
  <div style="flex:1;display:flex;flex-direction:column;background:var(--bg);">
    <div style="padding:16px 16px 12px;border-bottom:1px solid var(--border);background:white;">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:2px;">
        📋 已選擇的餐廳 <span id="route-preview-count" style="color:var(--primary);">0</span>
      </h2>
      <p style="font-size:11px;color:var(--muted);">點「查看路線地圖」開始規劃行程</p>
    </div>

    <!-- Route Preview List -->
    <div id="selected-preview" style="flex:1;overflow-y:auto;padding:12px;">
      <div class="empty-state" id="preview-empty">
        <i class="fa-solid fa-hand-pointer"></i>
        左側選擇餐廳<br/>
        <small>已選擇的餐廳會顯示在這裡</small>
      </div>
    </div>

    <!-- Route Calculation -->
    <div id="route-calc-panel" style="padding:12px 16px;border-top:1px solid var(--border);background:white;display:none;">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">
        💡 選擇 2 間或以上餐廳即可計算最短路線
      </div>
      <button class="btn btn-primary btn-full" id="calc-route-btn" onclick="calculateAndShowRoute()" disabled>
        <i class="fa-solid fa-route"></i> 計算最短路線
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     VIEW 2: MAP VIEW
══════════════════════════════════════════ -->
<div id="view-map">
  <!-- Top Bar -->
  <div id="map-top-bar">
    <button id="back-btn" onclick="switchToSelection()">
      <i class="fa-solid fa-arrow-left"></i> 返回選擇
    </button>
    <h2>🗺️ 路線地圖</h2>
    <span id="map-selected-count">0 間餐廳</span>
  </div>

  <!-- Map + Route Sidebar -->
  <div style="flex:1;display:flex;overflow:hidden;">
    <div id="map" style="flex:1;"></div>

    <!-- Route Sidebar -->
    <div id="route-sidebar">
      <div id="route-sidebar-header">
        📍 路線順序
      </div>
      <div id="route-stop-list"></div>
      <div id="map-actions">
        <button class="btn btn-secondary" onclick="clearAllRoute()" style="flex:1;font-size:12px;">
          <i class="fa-solid fa-trash"></i> 清除
        </button>
        <button class="btn btn-primary" onclick="reoptimizeRoute()" style="flex:1;font-size:12px;">
          <i class="fa-solid fa-arrows-spin"></i> 重新排序
        </button>
      </div>
    </div>
  </div>

  <!-- Route Info Panel -->
  <div id="route-info-panel">
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" id="stat-dist">—</div>
        <div class="stat-lbl">總距離 (km)</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-time">—</div>
        <div class="stat-lbl">步行時間 (分)</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="clearAllRoute()">
        <i class="fa-solid fa-trash"></i> 清除
      </button>
      <button class="btn btn-primary" onclick="reoptimizeRoute()" style="flex:1;">
        <i class="fa-solid fa-arrows-spin"></i> 重新計算
      </button>
    </div>
  </div>
</div>

<!-- Floating Route Button (shown in selection view) -->
<button id="floating-route-btn" onclick="switchToMap()">
  <i class="fa-solid fa-map-location-dot"></i>
  查看路線地圖 (<span id="floating-count">0</span>)
</button>

<!-- Toast -->
<div id="toast"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const API_BASE = window.location.origin;
let allRestaurants = [];
let routeStops = [];         // { poiId, name, address, lat, lng, geocoded }
let selectedRestaurants = new Set();
let map = null;
let routeLayer = null;
let markers = [];
let filterLate = false;
let filterEarly = false;

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  // Immediately show loading state in restaurant-list
  document.getElementById('restaurant-list').innerHTML = `
    <div class="loading-row">
      <i class="fa-solid fa-spinner fa-spin"></i><br/>
      正在連接伺服器...
    </div>`;
  
  showToast('🚀 載入地區列表...');
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);
    
    const resp = await fetch(`${API_BASE}/api/districts`, {
      signal: controller.signal
    });
    clearTimeout(timeout);
    
    if (!resp.ok) throw new Error('API error: ' + resp.status);
    
    const districts = await resp.json();
    if (!Array.isArray(districts) || districts.length === 0) {
      throw new Error('地區數據格式錯誤');
    }
    
    // Populate district select
    const sel = document.getElementById('district-select');
    sel.innerHTML = '<option value="">全部地區</option>' +
      districts.map(d => `<option value="${d}">${d}</option>`).join('');
    
    document.getElementById('total-db-count').textContent = districts.length + ' 個地區';
    showToast(`✅ ${districts.length} 個地區已載入，請選擇地區`);
    
    // Show "select a district" message
    document.getElementById('restaurant-list').innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-hand-point-up"></i>
        請先選擇地區<br/>
        <small>選擇地區後將自動載入該區餐廳</small>
      </div>`;
  } catch (e) {
    if (e.name === 'AbortError') {
      document.getElementById('restaurant-list').innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-wifi"></i><br/>
          載入超時（15秒）<br/>
          <small>請檢查網絡連線<br/>或稍後再試</small>
        </div>`;
      showToast('❌ 載入超時，請檢查網絡連線');
    } else {
      document.getElementById('restaurant-list').innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-circle-xmark"></i><br/>
          載入失敗：${e.message}<br/>
          <small>請檢查網絡或稍後再試</small>
        </div>`;
      showToast('❌ 無法載入數據庫：' + e.message);
    }
    console.error('Init error:', e);
  }
}

// ══════════════════════════════════════════
// RENDER RESTAURANT LIST
// ══════════════════════════════════════════

// Lazy-load cache: {district: [restaurants]}
const districtCache = {};
let currentDistrictData = [];  // Current loaded restaurants
let isLoadingDistrict = false;

async function loadDistrictData(district) {
  if (districtCache[district]) {
    return districtCache[district];
  }
  
  if (isLoadingDistrict) return [];
  isLoadingDistrict = true;
  
  const list = document.getElementById('restaurant-list');
  list.innerHTML = `<div class="loading-row"><i class="fa-solid fa-spinner fa-spin"></i><br/>載入 ${district} 餐廳中...</div>`;
  
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);
    const resp = await fetch(`${API_BASE}/api/restaurants?district=${encodeURIComponent(district)}`, {
      signal: controller.signal
    });
    clearTimeout(timeout);
    
    if (!resp.ok) throw new Error('API error');
    const data = await resp.json();
    districtCache[district] = data;
    return data;
  } catch (e) {
    console.error('Load district error:', e);
    return [];
  } finally {
    isLoadingDistrict = false;
  }
}

async function renderRestaurantList() {
  const list = document.getElementById('restaurant-list');
  const district = document.getElementById('district-select').value;
  const statusFilter = document.getElementById('status-filter').value;
  const search = document.getElementById('search-input').value.trim().toLowerCase();

  // No district selected - show instruction
  if (!district) {
    list.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-hand-point-up"></i>
        請先選擇地區<br/>
        <small>選擇地區後將自動載入該區餐廳</small>
      </div>`;
    document.getElementById('visible-count').textContent = '0';
    return;
  }

  // Load district data if not cached
  let filtered = await loadDistrictData(district);

  // Apply additional filters
  if (filterLate) filtered = filtered.filter(r => r.is_late_night);
  if (filterEarly) filtered = filtered.filter(r => r.is_early);
  if (statusFilter) {
    if (statusFilter === '未處理') filtered = filtered.filter(r => !r.status || r.status === 'None' || r.status === '');
    else filtered = filtered.filter(r => r.status === statusFilter);
  }
  if (search) filtered = filtered.filter(r => r.name.toLowerCase().includes(search));

  document.getElementById('visible-count').textContent = filtered.length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><i class="fa-solid fa-utensils"></i>沒有餐廳</div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const isSelected = selectedRestaurants.has(r.poiId);
    const hasCoords = r.geocoded && r.lat && r.lng;

    const tags = [];
    if (r.is_late_night) tags.push('<span class="rest-tag tag-late">🌙 宵夜</span>');
    if (r.is_early) tags.push('<span class="rest-tag tag-early">🌅 早市</span>');
    const status = r.status || '';
    if (status === '已認領' || status === '己認領') tags.push('<span class="rest-tag tag-claimed">✅ 已認領</span>');
    if (status === '已進駐' || status === '己進駐') tags.push('<span class="rest-tag tag-进驻">🏠 已進駐</span>');

    return `
    <div class="rest-item ${isSelected ? 'selected' : ''} ${hasCoords ? 'geocoded' : 'not-geocoded'}"
         onclick="toggleRest('${r.poiId}')" id="rest-${r.poiId}">
      <div class="rest-item-header">
        <input type="checkbox" class="rest-checkbox"
          ${isSelected ? 'checked' : ''}
          onclick="event.stopPropagation(); toggleRest('${r.poiId}')" />
        <div class="rest-name">${escapeHtml(r.name)}</div>
        <div class="rest-district-badge">${r.district || district}</div>
      </div>
      ${tags.length > 0 ? `<div class="rest-tags">${tags.join('')}</div>` : ''}
      <div class="rest-address">${escapeHtml(r.address || '')}</div>
      ${r.hours ? `<div class="rest-meta">${r.hours.split(';')[0]}</div>` : ''}
      <div class="rest-footer">
        <span class="geo-status ${hasCoords ? 'geo-ok' : 'geo-missing'}">
          ${hasCoords ? '📍 已定位' : '○ 未定位'}
        </span>
        ${!hasCoords ? `<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); geocodeOne('${r.poiId}')">定位</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// TOGGLE FUNCTIONS
// ══════════════════════════════════════════
function toggleFilter(type) {
  if (type === 'late') {
    filterLate = !filterLate;
    document.getElementById('toggle-late').classList.toggle('active', filterLate);
  } else {
    filterEarly = !filterEarly;
    document.getElementById('toggle-early').classList.toggle('active', filterEarly);
  }
  renderRestaurantList();
}

function toggleRest(poiId) {
  // Search through all cached district data
  let r = null;
  for (const district in districtCache) {
    r = districtCache[district].find(x => x.poiId === poiId);
    if (r) break;
  }
  if (!r) return;

  if (selectedRestaurants.has(poiId)) {
    selectedRestaurants.delete(poiId);
    routeStops = routeStops.filter(s => s.poiId !== poiId);
  } else {
    // Only add if geocoded
    if (r.geocoded && r.lat && r.lng) {
      selectedRestaurants.add(poiId);
      routeStops.push({
        poiId: r.poiId,
        name: r.name,
        address: r.address,
        lat: r.lat,
        lng: r.lng,
        geocoded: true
      });
    } else {
      showToast('⚠️ 該餐廳尚未定位，無法加入路線');
      return;
    }
  }

  // Update UI
  const el = document.getElementById(`rest-${poiId}`);
  if (el) el.classList.toggle('selected', selectedRestaurants.has(poiId));

  updateSelectionUI();
}

async function selectAllVisible() {
  const district = document.getElementById('district-select').value;
  if (!district) { showToast('⚠️ 請先選擇地區'); return; }
  
  const statusFilter = document.getElementById('status-filter').value;
  const search = document.getElementById('search-input').value.trim().toLowerCase();

  let filtered = districtCache[district] || await loadDistrictData(district);
  if (filterLate) filtered = filtered.filter(r => r.is_late_night);
  if (filterEarly) filtered = filtered.filter(r => r.is_early);
  if (statusFilter === '未處理') filtered = filtered.filter(r => !r.status || r.status === 'None' || r.status === '');
  else if (statusFilter) filtered = filtered.filter(r => r.status === statusFilter);
  if (search) filtered = filtered.filter(r => r.name.toLowerCase().includes(search));

  filtered.forEach(r => {
    if (r.geocoded && r.lat && r.lng && !selectedRestaurants.has(r.poiId)) {
      selectedRestaurants.add(r.poiId);
      routeStops.push({ poiId: r.poiId, name: r.name, address: r.address, lat: r.lat, lng: r.lng, geocoded: true });
    }
  });

  renderRestaurantList();
  updateSelectionUI();
  showToast(`✅ 已選擇 ${selectedRestaurants.size} 間餐廳`);
}

function deselectAllVisible() {
  const district = document.getElementById('district-select').value;
  const statusFilter = document.getElementById('status-filter').value;
  const search = document.getElementById('search-input').value.trim().toLowerCase();

  let filtered = districtCache[district] || [];
  if (filterLate) filtered = filtered.filter(r => r.is_late_night);
  if (filterEarly) filtered = filtered.filter(r => r.is_early);
  if (statusFilter === '未處理') filtered = filtered.filter(r => !r.status || r.status === 'None' || r.status === '');
  else if (statusFilter) filtered = filtered.filter(r => r.status === statusFilter);
  if (search) filtered = filtered.filter(r => r.name.toLowerCase().includes(search));

  filtered.forEach(r => {
    if (selectedRestaurants.has(r.poiId)) {
      selectedRestaurants.delete(r.poiId);
      routeStops = routeStops.filter(s => s.poiId !== r.poiId);
    }
  });

  renderRestaurantList();
  updateSelectionUI();
}

function updateSelectionUI() {
  const count = selectedRestaurants.size;
  document.getElementById('selected-count-display').textContent = `已選擇 ${count} 間`;
  document.getElementById('route-preview-count').textContent = count;
  document.getElementById('floating-count').textContent = count;
  document.getElementById('map-selected-count').textContent = `${count} 間餐廳`;

  // Floating button
  document.getElementById('floating-route-btn').classList.toggle('show', count > 0);

  // Preview panel
  const preview = document.getElementById('selected-preview');
  const empty = document.getElementById('preview-empty');
  const calcPanel = document.getElementById('route-calc-panel');

  if (count === 0) {
    empty.style.display = 'block';
    calcPanel.style.display = 'none';
  } else {
    empty.style.display = 'none';
    calcPanel.style.display = count >= 2 ? 'block' : 'none';
    document.getElementById('calc-route-btn').disabled = count < 2;
  }

  // Render preview list
  preview.innerHTML = routeStops.map((s, i) => `
    <div class="route-stop-item" style="margin-bottom:6px;">
      <div class="route-stop-num">${i + 1}</div>
      <div class="route-stop-info">
        <div class="route-stop-name">${escapeHtml(s.name)}</div>
        <div class="route-stop-addr">${escapeHtml(s.address || '')}</div>
      </div>
      <button class="route-stop-del" onclick="removeFromRoute('${s.poiId}')">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  `).join('');
}

function removeFromRoute(poiId) {
  selectedRestaurants.delete(poiId);
  routeStops = routeStops.filter(s => s.poiId !== poiId);
  renderRestaurantList();
  updateSelectionUI();
}

function getCurrentLocation() {
  if (!navigator.geolocation) {
    showToast('❌ 你的瀏覽器不支援定位功能');
    return;
  }
  showToast('📍 正在獲取位置...');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      showToast(`📍 位置：${lat.toFixed(5)}, ${lng.toFixed(5)}`);
      // Add as a waypoint if in map view
      if (document.getElementById('view-map').classList.contains('active') && map) {
        L.marker([lat, lng], {
          icon: L.divIcon({
            html: '<div style="background:#22c55e;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);"><i class="fa-solid fa-user"></i></div>',
            className: '', iconSize: [28, 28], iconAnchor: [14, 14]
          })
        }).addTo(map).bindPopup('📍 我的位置').openPopup();
        map.setView([lat, lng], 15);
      }
    },
    (err) => {
      showToast('❌ 無法獲取位置，請檢查定位權限');
      console.error(err);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ══════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════
function switchToMap() {
  if (selectedRestaurants.size === 0) {
    showToast('⚠️ 請先選擇餐廳');
    return;
  }
  document.getElementById('view-selection').classList.add('hidden');
  document.getElementById('view-map').classList.add('active');
  document.getElementById('route-sidebar').classList.add('show');
  initMap();
  renderRouteStops();
  drawRoute();
}

function switchToSelection() {
  document.getElementById('view-selection').classList.remove('hidden');
  document.getElementById('view-map').classList.remove('active');
}

// ══════════════════════════════════════════
// MAP
// ══════════════════════════════════════════
function initMap() {
  if (map) { map.invalidateSize(); return; }
  map = L.map('map').setView([22.3193, 114.1694], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

function renderRouteStops() {
  const list = document.getElementById('route-stop-list');
  list.innerHTML = routeStops.map((s, i) => `
    <div class="route-stop-item">
      <div class="route-stop-num">${i + 1}</div>
      <div class="route-stop-info">
        <div class="route-stop-name">${escapeHtml(s.name)}</div>
        <div class="route-stop-addr">${escapeHtml(s.address || '')}</div>
      </div>
      <button class="route-stop-del" onclick="removeFromRoute('${s.poiId}')">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  `).join('');
}

async function drawRoute() {
  if (!map || routeStops.length === 0) return;

  // Clear old
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // Add markers
  routeStops.forEach((s, i) => {
    const icon = L.divIcon({
      html: `<div style="background:${i === 0 ? '#22c55e' : i === routeStops.length - 1 ? '#ef4444' : '#2563eb'};color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">${i + 1}</div>`,
      className: '', iconSize: [28, 28], iconAnchor: [14, 14]
    });
    const m = L.marker([s.lat, s.lng], { icon }).addTo(map)
      .bindPopup(`<b>${escapeHtml(s.name)}</b><br/>${escapeHtml(s.address || '')}`);
    markers.push(m);
  });

  // Fit bounds
  if (routeStops.length === 1) {
    map.setView([routeStops[0].lat, routeStops[0].lng], 15);
  } else {
    const bounds = L.latLngBounds(routeStops.map(s => [s.lat, s.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }

  // Draw route if 2+ stops
  if (routeStops.length >= 2) {
    await calculateRoute();
  } else {
    document.getElementById('route-info-panel').classList.remove('show');
  }
}

async function calculateRoute() {
  if (routeStops.length < 2) return;

  const coords = routeStops.map(s => `[${s.lng}, ${s.lat}]`).join(',');
  // Try primary OSRM server first
  const osrmUrls = [
    `https://router.project-osrm.org/route/v1/foot/${coords}?overview=full&geometries=geojson`,
    `https://routing.openstreetmap.de/routed-foot/route/v1/foot/${coords}?overview=full&geometries=geojson`
  ];

  let route = null;
  for (const url of osrmUrls) {
    try {
      const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) continue;
      const data = await resp.json();
      if (data.routes && data.routes[0]) {
        route = data.routes[0];
        break;
      }
    } catch (e) {
      console.warn('OSRM error:', url, e.message);
      continue;
    }
  }

  if (!route) {
    // Fallback: straight-line distance
    let totalDist = 0;
    for (let i = 1; i < routeStops.length; i++) {
      const d = Math.hypot(
        routeStops[i].lat - routeStops[i-1].lat,
        routeStops[i].lng - routeStops[i-1].lng
      );
      totalDist += d * 111; // rough km conversion
    }
    const distKm = totalDist.toFixed(2);
    const walkTime = Math.round(totalDist / 5 * 60); // 5km/h walking

    if (routeLayer) map.removeLayer(routeLayer);
    // Draw straight lines as fallback
    const latlngs = routeStops.map(s => [s.lat, s.lng]);
    routeLayer = L.polyline(latlngs, {
      color: '#2563eb', weight: 3, opacity: 0.7, dashArray: '8, 8'
    }).addTo(map);

    document.getElementById('route-info-panel').classList.add('show');
    document.getElementById('stat-dist').textContent = distKm + ' (直線)';
    document.getElementById('stat-time').textContent = walkTime;
    showToast(`⚠️ 路線服務不可用，顯示直線距離`);
    return;
  }

  const distance = (route.distance / 1000).toFixed(2);
  const duration = Math.round(route.duration / 60);

  // Draw polyline
  if (routeLayer) map.removeLayer(routeLayer);
  routeLayer = L.geoJSON(route.geometry, {
    style: { color: '#2563eb', weight: 4, opacity: 0.8 }
  }).addTo(map);

  // Update stats
  document.getElementById('route-info-panel').classList.add('show');
  document.getElementById('stat-dist').textContent = distance;
  document.getElementById('stat-time').textContent = duration;

    showToast(`✅ 路線已計算：${distance}km / 約${duration}分鐘`);
  } catch (e) {
    showToast('❌ 路線計算失敗');
    console.error(e);
  }
}

async function calculateAndShowRoute() {
  switchToMap();
  await new Promise(r => setTimeout(r, 300));
  await calculateRoute();
}

function reoptimizeRoute() {
  // Simple nearest-neighbor optimization
  if (routeStops.length < 2) return;
  const optimized = [routeStops[0]];
  const remaining = routeStops.slice(1);
  while (remaining.length > 0) {
    const last = optimized[optimized.length - 1];
    let nearest = remaining[0];
    let minDist = Infinity;
    remaining.forEach(r => {
      const d = Math.hypot(r.lat - last.lat, r.lng - last.lng);
      if (d < minDist) { minDist = d; nearest = r; }
    });
    optimized.push(nearest);
    remaining.splice(remaining.indexOf(nearest), 1);
  }
  routeStops = optimized;
  renderRouteStops();
  drawRoute();
  showToast('🔄 路線已重新排序');
}

function clearAllRoute() {
  selectedRestaurants.clear();
  routeStops = [];
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  document.getElementById('route-info-panel').classList.remove('show');
  renderRouteStops();
  updateSelectionUI();
  renderRestaurantList();
}

// ══════════════════════════════════════════
// GEOCODING (single)
// ══════════════════════════════════════════
async function geocodeOne(poiId) {
  let r = null;
  for (const district in districtCache) {
    r = districtCache[district].find(x => x.poiId === poiId);
    if (r) break;
  }
  if (!r || !r.address) return;

  try {
    const resp = await fetch(`${API_BASE}/api/geocode?poiId=${poiId}&address=${encodeURIComponent(r.address)}`);
    const data = await resp.json();
    if (data.lat && data.lng) {
      r.lat = data.lat;
      r.lng = data.lng;
      r.geocoded = true;
      renderRestaurantList();
      showToast(`📍 ${r.name} 定位成功`);
    } else {
      showToast(`❌ ${r.name} 定位失敗`);
    }
  } catch (e) {
    showToast('❌ Geocoding 請求失敗');
  }
}

// ══════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
init();
</script>
</body>
</html>
